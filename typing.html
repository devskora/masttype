
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Mast-Type | Free Typing Practice & Speed Test</title>

    <meta name="description"
        content="Practice typing online with Mast-Type. Improve your typing speed, accuracy and WPM through free typing tests.">

    <meta name="keywords"
        content="typing test, typing practice, typing speed, WPM test, keyboard practice, typing game">

    <meta name="author" content="Dev kashyap">

    <meta name="robots" content="index, follow">

    <!-- Theme Color -->
    <meta name="theme-color" content="#111111">

    <!-- Canonical URL -->
    <!-- CHANGE THIS AFTER DEPLOYMENT -->
    <!-- <link rel="canonical" href="https://mastType.github.io/typing.html"> -->

    <!-- Favicon -->
    <!-- PLACE favicon.ico IN ROOT FOLDER -->
     <link rel="icon" href="./favicon.png" type="image.png">

    <!-- Apple Devices -->
    <!-- PLACE 180x180 PNG -->
    <!-- <link rel="apple-touch-icon" href="./apple-touch-icon.png"> -->

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Mast-Type">
    <meta property="og:description"
        content="Free typing practice platform for improving speed and accuracy.">

    <meta property="og:type" content="website">

    <!-- ADD THUMBNAIL IMAGE -->
    <meta property="og:image"
        content="https://masttype.github.io/preview-image.jpg">

    <meta property="og:url"
        content="https://masttype.github.io/typing.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- CSS -->
    <link rel="stylesheet" href="typing.css">
</head>

<body>

    
    <header class="header">
         <a href='./index.html' class="image"><img src="./favicon.png" alt="Logo" ></a>

        <nav
            class="header-nav"
            aria-label="Main Navigation">

            <a href="./index.html">
                Home
            </a>

            <a
                href="./typing.html"
                aria-current="page">
                Typing
            </a>

        </nav>

    </header>

    <!-- Main -->
    <main id="main-content">

        <section
            class="typing-area"
            aria-labelledby="typing-heading">

            <h1
                id="typing-heading"
                class="typing-field">

                <span
                    class="user "
                    aria-label="User Typed Text">
                </span>

                <span
                    class="type-able-text"
                    aria-label="Typing Text">
                </span>

            </h1>

            <!-- Screen Readers Will Read Updates -->
            <p
                class="start-typing"
                aria-live="polite">

                Start Typing

            </p>

            <input type='text'
            aria-label="Type Text"
            placeholder='type here.' class="mobile-user-input" onchange="userType()" />
           
            

            <!-- Restart Button -->

            <button
                type="button"
                onclick="start()"
                class="restart-button"
                aria-label="Restart Typing Test">

                Restart

            </button>

        </section>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <p>
            © 2026 Mast-Type. All Rights Reserved.
        </p>

        
        <!-- <a href="https://github.com/dev">
            GitHub
        </a> -->
       

    </footer>

    <!-- Structured Data -->
    <script type="application/ld+json">
<!-- {
    "@context":"https://schema.org",
    "@type":"WebApplication",
    "name":"Mast-Type",
    "applicationCategory":"EducationalApplication",
    "operatingSystem":"Web",
    "description":"Free online typing practice and speed test platform."
} -->
</script>

    <!-- Main Script -->
    <script src="typing.js"></script>

</body>

</html>
